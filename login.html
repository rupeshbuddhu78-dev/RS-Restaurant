<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RS Restaurant - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: url("https://images.unsplash.com/photo-1551782450-17144efb9c50?auto=format&fit=crop&w=1920&q=80") no-repeat center center fixed;
      background-size: cover;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.4);
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 25px;
    }

    nav ul li a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 5px;
      transition: 0.3s;
    }

    nav ul li a:hover,
    nav ul li a.active {
      background: rgba(255, 255, 255, 0.25);
      color: #ffeb3b;
    }

    .hamburger {
      display: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
    }

    .hamburger div {
      width: 25px;
      height: 3px;
      background-color: #fff;
      border-radius: 2px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
      backdrop-filter: blur(4px);
    }

    .box {
      background: rgba(0, 0, 0, 0.55);
      width: 320px;
      box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 30px;
      color: #fff;
    }

    .box h3 {
      text-align: center;
      font-weight: bold;
      font-size: 25px;
      margin-bottom: 15px;
      color: #ffeb3b;
      text-shadow: 1px 1px 2px #000;
    }

    .box label {
      display: block;
      margin-top: 10px;
      color: #fff;
    }

    .box input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-top: 5px;
    }

    .box button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background: #ff9800;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .box button:hover {
      background: #ffb300;
    }

    .links {
      text-align: center;
      margin-top: 10px;
    }

    .links a {
      color: #ffeb3b;
      text-decoration: underline;
      font-size: 14px;
    }

    .links a:hover {
      color: #fff;
    }

    @media (max-width: 768px) {
      .hamburger {
        display: flex;
      }

      nav ul {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        padding: 20px 0;
        align-items: center;
        gap: 15px;
      }

      nav ul.active {
        display: flex;
      }

      nav {
        padding: 15px 20px;
      }
    }

    .pass {
      position: relative;
    }

    .toggle {
      position: absolute;
      bottom: 10px;
      right: 10px;
      cursor: pointer;
      font-size: 16px;
      color: #555;
      user-select: none;
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <div class="logo">RS Restaurant</div>
      <div class="hamburger">
        <div></div>
        <div></div>
        <div></div>
      </div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="category.html">Category</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="signup.html">SignUp</a></li>
        <li><a href="loginpage.html" class="active">Login</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="box">
      <h3>Welcome Back</h3>

      <div class="pass">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <br>
      <div class="pass">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
        <span class="toggle" id="togglePass" onclick="togglePassword()">😉</span>
      </div>
      <br>
      <button onclick="login()">Login</button>
      <div class="links">
        <a href="#">Forgot Password?</a><br><br>
        <a href="signup.html">Don’t have an account? SignUp</a>
      </div>

    </div>
  </div>

  <script>
    // Hamburger menu
    const hamburger = document.querySelector(".hamburger");
    const navMenu = document.querySelector("nav ul");
    hamburger.addEventListener("click", () => {
      navMenu.classList.toggle("active");
    });


    function login() {
      let a = document.getElementById("email").value;
      let b = document.getElementById("password").value;

      let storeid = localStorage.getItem("userid");

      if (storeid === null) {
        alert("Account not found");
        return;
      }

      let storepass = JSON.parse(storeid);

      if (a === storepass.email && b === storepass.password) {
        alert("Login Success");
        window.location.href = "index.html";
      } else {
        alert("Invalid Email or Password");
      }
    }






    // Show/Hide Password
    let showPass = false;
    function togglePassword() {
      const pass = document.getElementById("password");
      const emoji = document.getElementById("togglePass");
      if (showPass) {
        pass.type = "password";
        emoji.innerText = "😉";
        showPass = false;
      } else {
        pass.type = "text";
        emoji.innerText = "🙈";
        showPass = true;
      }
    }


  </script>
</body>

</html>
