<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS Restaurant - Signup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: url("https://images.unsplash.com/photo-1551782450-17144efb9c50?auto=format&fit=crop&w=1920&q=80") no-repeat center center fixed;
      background-size: cover;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.4);
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 25px;
      transition: all 0.3s ease;
    }

    nav ul li a {
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      transition: 0.3s;
      padding: 8px 14px;
      border-radius: 5px;
    }

    nav ul li a:hover,
    nav ul li a.active {
      background: rgba(255, 255, 255, 0.25);
      color: #ffeb3b;
    }

    .menu-toggle {
      display: none;
      font-size: 28px;
      cursor: pointer;
      color: #fff;
    }

    @media (max-width: 768px) {
      nav ul {
        position: absolute;
        top: 65px;
        left: -100%;
        width: 100%;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        padding: 20px 0;
        text-align: center;
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
      }

      nav ul.show {
        left: 0;
      }

      .menu-toggle {
        display: block;
      }
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
      backdrop-filter: blur(4px);
    }

    .box {
      background: rgba(0, 0, 0, 0.55);
      width: 320px;
      box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 30px;
      color: #fff;
    }

    .box h3 {
      text-align: center;
      font-weight: bold;
      font-size: 25px;
      margin-bottom: 15px;
      color: #ffeb3b;
      text-shadow: 1px 1px 2px #000;
    }

    .box label {
      display: block;
      margin-top: 10px;
      color: #fff;
    }

    .box input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-top: 5px;
    }

    .box button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background: #ff9800;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .box button:hover {
      background: #ffb300;
    }

    .links {
      text-align: center;
      margin-top: 10px;
    }

    .links a {
      color: #ffeb3b;
      text-decoration: underline;
      font-size: 14px;
    }

    .links a:hover {
      color: #fff;
    }

    .toggle {
      position: absolute;
      bottom: 1px;
      right: 10px;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 14px;
      color: #555;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      /* remove blue tap */
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <div class="logo">RS Restaurant</div>
      <div class="menu-toggle" onclick="toggleMenu()">☰</div>
      <ul id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="category.html">Category</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="loginpage.html" class="active">SignUp</a></li>
        <li><a href="c.html">Contact</a></li>
      </ul>
    </nav>
  </header>
  <div class="container">
    <div class="box">
      <h3>Create Account</h3>


      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" required>

      <label for="Email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="eye" placeholder="Enter password" required>
        <span class="toggle" id="hide" onclick="togglePassword()">😉</span>
      </div>

      <div class="input-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Confirm password" required>
        <span class="toggle" id="hide1" onclick="toggle()">😉</span>
      </div>

      <button type="submit" id="btn" onclick="btn()">Sign Up</button>
      <div class="links">
        <a href="#">Forgot Password?</a><br>
        <a href="login.html">Already have an account? Login</a>
      </div>

    </div>
  </div>
  <script>
    function toggleMenu() {
      const navLinks = document.getElementById('nav-links');
      navLinks.classList.toggle('show');
    }

    // localstorage mai store karna
    function btn() {
      let a = username.value;
      let b = email.value;
      let c = eye.value;

      if (a === "" || b === "" || c === "") {
        alert("Please fill all fields");
        return;
      }

      let userpass = {
        name: a,
        email: b,
        password: c
      };

      // ✅ CORRECT STORAGE
      localStorage.setItem("userid", JSON.stringify(userpass));

      alert("Account Created Successfully");
      window.location.href = "login.html";
    }



    // this part for absoulte icon in input
    let show = ture;
    function togglePassword() {
      let pass = document.getElementById("eye");
      let emoji = document.getElementById("hide");

      if (show === ture) {
        pass.type = "text";
        emoji.innerText = "😉"

        show = false;
      }
      else {
        pass.type = "password";
        emoji.innerText = "🙈";
        show = ture;
      }
    }
    let show1 = false;
    function toggle() {
      let pas = document.getElementById("confirm")
      let em = document.getElementById("hide1");
      if (show1 === false) {
        pas.type = "text";
        em.innerText = "😉";
        show1 = true;
      }
      else {
        pas.type = "password";
        em.innerText = "🙈";
        show1 = false;
      }
    }
  </script>
</body>

</html>
